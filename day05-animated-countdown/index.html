<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Animated Countdown</title>
</head>
<body>
    <div class="counter">
        <div class="nums">
            <!-- 初始状态下，只有数字 3 拥有‘in‘ 类名，以便页面一加载就自动开始第一轮入场动画-->
            <span class="in">3</span>
            <span>2</span>
            <span>1</span>
            <span>0</span>
        </div>

        <h4>Get Ready</h4>
    </div>

    <div class="final">
        <h1>Go</h1>

        <button id="replay">
            <span>Replay</span>
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
